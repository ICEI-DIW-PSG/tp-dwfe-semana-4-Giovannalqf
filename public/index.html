<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">


</head>
<body>
    <header class="header">
    <h1>FoodExplorer</h1>

    <nav class="menu">
        <ul>
         <li>Home</li>
         <li>Restaurantes</li>
         <li>Pratos</li>
         <li>Histórico</li>
         <li>Promoções</li>
        </ul>
    </nav>
</header>

<main class="main">

    <!--BANNER-->
    <section class=" banner">
      <h2>DESCUBRA OS MELHORES RESTAURANTES</h2>
    </section>

    <!-- FORMULÁRIO -->
    <section class="busca">
        <h2>Buscar</h2>

        <form class="form">
            <input type="text" placeholder="Restaurante">
            <input type="text" placeholder="Prato">
            <button>Buscar</button>
        </form>
    </section>

    <!-- RESTAURANTES -->
    <section class="restaurantes">
        <h2>Restaurantes</h2>

        <article class="card">
            <img src="rest1.jfif">
            <p>Restaurante 1</p>
        </article>

        <article class="card">
            <img src="rest2.jfif">
            <p>Restaurante 2</p>
        </article>

        <article class="card">
            <img src="rest3.jfif">
            <p>Restaurante 3</p>
        </article>

        <article class="card">
            <img src="rest4.jfif">
            <p>Restaurante 4</p>
        </article>

    </section>

    <!-- PRATOS -->
    <section class="pratos">
        <h2>Pratos</h2>

        <article class="card">
            <img src="pizza.jfif">
         <p>Pizza</p>
        </article>

        <article class="card">
            <img src="hamburguer.jfif"> 
            <p>Hambúrguer</p>
        </article>

        <article class="card">
            <img src="sushi.jfif">
            <p>Sushi</p>
        </article>

        <article class="card">
            <img src="sorvetes.jfif"> 
            <p>Sorvetes</p>
        </article>

    </section>

</main>

<footer class="footer">
    <p>© 2026</p>
</footer>

</body>
</html>
